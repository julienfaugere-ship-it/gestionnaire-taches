<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestionnaire de Tâches Équipe</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; }
    select, input, textarea, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const MEMBERS = ["Julien"];
    const CATEGORIES = ["Design", "Dev", "Marketing", "RH", "Finance", "Autre"];
    const PRIORITIES = ["Haute", "Moyenne", "Faible"];
    const STATUSES = ["À faire", "En cours", "Terminé"];

    const PRIORITY_COLORS = {
      Haute: { bg: "#fee2e2", text: "#dc2626", dot: "#dc2626" },
      Moyenne: { bg: "#fef9c3", text: "#ca8a04", dot: "#eab308" },
      Faible: { bg: "#dcfce7", text: "#16a34a", dot: "#22c55e" },
    };

    const STATUS_COLORS = {
      "À faire": { bg: "#f1f5f9", text: "#64748b", border: "#cbd5e1" },
      "En cours": { bg: "#eff6ff", text: "#2563eb", border: "#93c5fd" },
      "Terminé": { bg: "#f0fdf4", text: "#16a34a", border: "#86efac" },
    };

    const CAT_COLORS = ["#6366f1","#f59e0b","#10b981","#ef4444","#8b5cf6","#14b8a6"];
    const emptyTask = { title: "", desc: "", member: "", priority: "Moyenne", category: "Autre", status: "À faire", due: "" };

    function App() {
      const [tasks, setTasks] = useState([
        { id: 1, title: "Refonte page d'accueil", desc: "Moderniser le design", member: "Julien", priority: "Haute", category: "Design", status: "En cours", due: "2026-04-30" },
        { id: 2, title: "API intégration paiement", desc: "Stripe v3", member: "Julien", priority: "Haute", category: "Dev", status: "À faire", due: "2026-05-05" },
      ]);
      const [showForm, setShowForm] = useState(false);
      const [form, setForm] = useState(emptyTask);
      const [editId, setEditId] = useState(null);
      const [filters, setFilters] = useState({ member: "", priority: "", category: "", status: "" });
      const [search, setSearch] = useState("");

      const filtered = useMemo(() => tasks.filter(t => {
        if (filters.member && t.member !== filters.member) return false;
        if (filters.priority && t.priority !== filters.priority) return false;
        if (filters.category && t.category !== filters.category) return false;
        if (filters.status && t.status !== filters.status) return false;
        if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      }), [tasks, filters, search]);

      const counts = useMemo(() => STATUSES.reduce((a, s) => ({ ...a, [s]: tasks.filter(t => t.status === s).length }), {}), [tasks]);

      const saveTask = () => {
        if (!form.title.trim()) return;
        if (editId !== null) {
          setTasks(ts => ts.map(t => t.id === editId ? { ...form, id: editId } : t));
          setEditId(null);
        } else {
          setTasks(ts => [...ts, { ...form, id: Date.now() }]);
        }
        setForm(emptyTask);
        setShowForm(false);
      };

      const deleteTask = id => setTasks(ts => ts.filter(t => t.id !== id));
      const openEdit = t => { setForm({ ...t }); setEditId(t.id); setShowForm(true); };
      const cycleStatus = t => {
        const idx = STATUSES.indexOf(t.status);
        setTasks(ts => ts.map(x => x.id === t.id ? { ...x, status: STATUSES[(idx + 1) % STATUSES.length] } : x));
      };
      const isOverdue = due => due && new Date(due) < new Date();

      return (
        <div style={{ fontFamily: "sans-serif", background: "#f8fafc", minHeight: "100vh", padding: "24px 16px" }}>
          <div style={{ maxWidth: 900, margin: "0 auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div>
                <h1 style={{ fontSize: 26, fontWeight: 800, color: "#1e293b" }}>📋 Tâches Équipe</h1>
                <p style={{ color: "#64748b", fontSize: 13, marginTop: 4 }}>{tasks.length} tâche{tasks.length > 1 ? "s" : ""} au total</p>
              </div>
              <button onClick={() => { setForm(emptyTask); setEditId(null); setShowForm(true); }}
                style={{ background: "#6366f1", color: "#fff", border: "none", borderRadius: 10, padding: "10px 20px", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
                + Nouvelle tâche
              </button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 24 }}>
              {STATUSES.map(s => (
                <div key={s} style={{ background: "#fff", borderRadius: 12, padding: "14px 18px", boxShadow: "0 1px 4px #0001", borderTop: `3px solid ${STATUS_COLORS[s].border}` }}>
                  <div style={{ fontSize: 22, fontWeight: 800, color: STATUS_COLORS[s].text }}>{counts[s]}</div>
                  <div style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, marginTop: 2 }}>{s}</div>
                </div>
              ))}
            </div>

            <div style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", marginBottom: 20, boxShadow: "0 1px 4px #0001", display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Rechercher…"
                style={{ flex: 1, minWidth: 140, border: "1px solid #e2e8f0", borderRadius: 8, padding: "7px 12px", fontSize: 13, outline: "none" }} />
              {[["member", MEMBERS, "👤 Membre"], ["priority", PRIORITIES, "🎯 Priorité"], ["category", CATEGORIES, "🏷️ Catégorie"], ["status", STATUSES, "📌 Statut"]].map(([k, opts, lbl]) => (
                <select key={k} value={filters[k]} onChange={e => setFilters(f => ({ ...f, [k]: e.target.value }))}
                  style={{ border: "1px solid #e2e8f0", borderRadius: 8, padding: "7px 10px", fontSize: 13, outline: "none", background: "#fff" }}>
                  <option value="">{lbl}</option>
                  {opts.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              ))}
              {(Object.values(filters).some(Boolean) || search) &&
                <button onClick={() => { setFilters({ member: "", priority: "", category: "", status: "" }); setSearch(""); }}
                  style={{ background: "#f1f5f9", border: "none", borderRadius: 8, padding: "7px 12px", fontSize: 12, color: "#64748b", cursor: "pointer", fontWeight: 600 }}>✕ Réinitialiser</button>}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filtered.length === 0 && (
                <div style={{ textAlign: "center", padding: 40, color: "#94a3b8", background: "#fff", borderRadius: 12 }}>Aucune tâche trouvée</div>
              )}
              {filtered.map(t => {
                const pc = PRIORITY_COLORS[t.priority];
                const sc = STATUS_COLORS[t.status];
                const catIdx = CATEGORIES.indexOf(t.category);
                const overdue = isOverdue(t.due) && t.status !== "Terminé";
                return (
                  <div key={t.id} style={{ background: "#fff", borderRadius: 12, padding: "14px 18px", boxShadow: "0 1px 4px #0001", display: "flex", gap: 14, alignItems: "flex-start", borderLeft: `4px solid ${pc.dot}`, opacity: t.status === "Terminé" ? 0.75 : 1 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                        <span style={{ fontWeight: 700, fontSize: 15, color: "#1e293b", textDecoration: t.status === "Terminé" ? "line-through" : "none" }}>{t.title}</span>
                        <span style={{ background: pc.bg, color: pc.text, borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>{t.priority}</span>
                        <span style={{ background: CAT_COLORS[catIdx % CAT_COLORS.length] + "22", color: CAT_COLORS[catIdx % CAT_COLORS.length], borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 600 }}>{t.category}</span>
                      </div>
                      {t.desc && <p style={{ margin: "0 0 6px", color: "#64748b", fontSize: 13 }}>{t.desc}</p>}
                      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center" }}>
                        {t.member && <span style={{ fontSize: 12, color: "#475569" }}>👤 {t.member}</span>}
                        {t.due && <span style={{ fontSize: 12, color: overdue ? "#dc2626" : "#475569", fontWeight: overdue ? 700 : 400 }}>
                          {overdue ? "⚠️" : "📅"} {new Date(t.due).toLocaleDateString("fr-FR")}
                        </span>}
                      </div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8, flexShrink: 0 }}>
                      <button onClick={() => cycleStatus(t)}
                        style={{ background: sc.bg, color: sc.text, border: `1px solid ${sc.border}`, borderRadius: 8, padding: "5px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                        {t.status}
                      </button>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => openEdit(t)} style={{ background: "#f1f5f9", border: "none", borderRadius: 7, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#475569" }}>✏️</button>
                        <button onClick={() => deleteTask(t.id)} style={{ background: "#fff0f0", border: "none", borderRadius: 7, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#ef4444" }}>🗑️</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {showForm && (
            <div style={{ position: "fixed", inset: 0, background: "#0006", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }}>
              <div style={{ background: "#fff", borderRadius: 16, padding: 28, width: "100%", maxWidth: 480, boxShadow: "0 20px 60px #0003" }}>
                <h2 style={{ marginBottom: 20, fontSize: 18, fontWeight: 800, color: "#1e293b" }}>{editId ? "Modifier la tâche" : "Nouvelle tâche"}</h2>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <input value={form.title} onChange={e => setForm(f => ({ ...f, title: e.target.value }))} placeholder="Titre de la tâche *"
                    style={{ border: "1px solid #e2e8f0", borderRadius: 9, padding: "10px 14px", fontSize: 14, outline: "none" }} />
                  <textarea value={form.desc} onChange={e => setForm(f => ({ ...f, desc: e.target.value }))} placeholder="Description (optionnel)" rows={2}
                    style={{ border: "1px solid #e2e8f0", borderRadius: 9, padding: "10px 14px", fontSize: 14, outline: "none", resize: "none" }} />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <select value={form.member} onChange={e => setForm(f => ({ ...f, member: e.target.value }))}
                      style={{ border: "1px solid #e2e8f0", borderRadius: 9, padding: "10px 12px", fontSize: 14, outline: "none" }}>
                      <option value="">👤 Assigner à…</option>
                      {MEMBERS.map(m => <option key={m}>{m}</option>)}
                    </select>
                    <select value={form.priority} onChange={e => setForm(f => ({ ...f, priority: e.target.value }))}
                      style={{ border: "1px solid #e2e8f0", borderRadius: 9, padding: "10px 12px", fontSize: 14, outline: "none" }}>
                      {PRIORITIES.map(p => <option key={p}>{p}</option>)}
                    </select>
                    <select value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}
                      style={{ border: "1px solid #e2e8f0", borderRadius: 9, padding: "10px 12px", fontSize: 14, outline: "none" }}>
                      {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                    </select>
                    <select value={form.status} onChange={e => setForm(f => ({ ...f, status: e.target.value }))}
                      style={{ border: "1px solid #e2e8f0", borderRadius: 9, padding: "10px 12px", fontSize: 14, outline: "none" }}>
                      {STATUSES.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <input type="date" value={form.due} onChange={e => setForm(f => ({ ...f, due: e.target.value }))}
                    style={{ border: "1px solid #e2e8f0", borderRadius: 9, padding: "10px 14px", fontSize: 14, outline: "none" }} />
                </div>
                <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
                  <button onClick={() => { setShowForm(false); setEditId(null); setForm(emptyTask); }}
                    style={{ flex: 1, background: "#f1f5f9", border: "none", borderRadius: 9, padding: 11, fontSize: 14, fontWeight: 600, cursor: "pointer", color: "#475569" }}>Annuler</button>
                  <button onClick={saveTask}
                    style={{ flex: 1, background: "#6366f1", border: "none", borderRadius: 9, padding: 11, fontSize: 14, fontWeight: 700, cursor: "pointer", color: "#fff" }}>{editId ? "Enregistrer" : "Créer la tâche"}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
